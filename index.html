<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/whiteboard.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Dr. Rahul Mishra — Assistant Professor & Head, Computer Center, Department of Computer Science and Engineering, IIT Patna. Research in Federated Learning, Edge Computation, and Applied AI."
    />
    <!-- Inter via Google Fonts (with system fallback in Tailwind config) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Hand-drawn whiteboard fonts: Kalam (pen, readable body) + Caveat (marker, display) -->
    <link
      href="https://fonts.googleapis.com/css2?family=Kalam:wght@300;400;700&family=Caveat:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>Dr. Rahul Mishra · CSE, IIT Patna</title>
    <!-- Set the theme class before first paint to avoid a flash of the wrong
         theme. Light is the default; only go dark when the user explicitly chose it. -->
    <script>
      (function () {
        try {
          if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark')
          }
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
